name: Deploy Frontend (GitHub Pages)

env:
  GH_PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static frontend
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ env.GH_PAGES_URL }}

    steps:
      - name: Deploy pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish frontend live link
        if: always()
        run: |
          echo "### Frontend Live Link" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open PlanPilot Frontend]($GH_PAGES_URL)" >> "$GITHUB_STEP_SUMMARY"
